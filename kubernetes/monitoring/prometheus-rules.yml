apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: monitoring
data:
  alerts.yml: |
    groups:
      - name: critical_alerts
        rules:
          - alert: ServiceDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Servis {{ $labels.job }} DOWN"
              description: "{{ $labels.instance }} ({{ $labels.job }}) 1 dakikadır erişilemiyor."

          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[5m]) > 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} crash loop'ta"
              description: "{{ $labels.namespace }}/{{ $labels.pod }} sürekli yeniden başlatılıyor."

          - alert: DiskUsageHigh
            expr: (1 - node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"}) * 100 > 90
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Disk kullanımı %90 üzerinde"
              description: "{{ $labels.instance }} üzerinde disk kullanımı %{{ $value }}."

          - alert: DatabaseDown
            expr: up{kubernetes_pod_name=~"postgres.*"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "PostgreSQL veritabanı DOWN"
              description: "PostgreSQL pod'u yanıt vermiyor."

      - name: warning_alerts
        rules:
          - alert: HighCPUUsage
            expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 20
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Yüksek CPU kullanımı"
              description: "{{ $labels.instance }} CPU kullanımı %{{ $value }}."

          - alert: HighMemoryUsage
            expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Yüksek bellek kullanımı"
              description: "{{ $labels.instance }} bellek kullanımı %{{ $value }}."

          - alert: HighResponseTime
            expr: rate(http_server_requests_seconds_sum{uri!="/actuator/prometheus"}[5m]) / rate(http_server_requests_seconds_count{uri!="/actuator/prometheus"}[5m]) > 1
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "Yüksek yanıt süresi"
              description: "Ortalama yanıt süresi {{ $value }}s."
