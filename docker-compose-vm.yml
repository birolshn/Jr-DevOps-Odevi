version: '3.8'

# VM Tarafı Servisler - Zabbix ile izlenecek
# PostgreSQL (5433), Redis (6379), RabbitMQ (5672/15672)
# Zabbix Server + Web UI + Agent

services:
  # ===== İZLENECEK SERVİSLER =====

  # PostgreSQL - VM tarafı (port 5433, K8s'deki ile çakışmasın)
  postgres-vm:
    image: postgres:13
    container_name: postgres-vm
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "4198"
      POSTGRES_DB: DriverDB
    ports:
      - "5433:5432"
    volumes:
      - postgres_vm_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - zabbix-net

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - zabbix-net

  # RabbitMQ (Management UI dahil)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    restart: unless-stopped
    networks:
      - zabbix-net

  # ===== ZABBIX STACK =====

  # Zabbix'in kendi PostgreSQL veritabanı
  zabbix-db:
    image: postgres:13
    container_name: zabbix-db
    environment:
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix123
      POSTGRES_DB: zabbix
    volumes:
      - zabbix_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - zabbix-net

  # Zabbix Server
  zabbix-server:
    image: zabbix/zabbix-server-pgsql:ubuntu-7.0-latest
    container_name: zabbix-server
    environment:
      DB_SERVER_HOST: zabbix-db
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix123
      POSTGRES_DB: zabbix
      ZBX_CACHESIZE: 128M
    ports:
      - "10051:10051"
    depends_on:
      - zabbix-db
    restart: unless-stopped
    networks:
      - zabbix-net

  # Zabbix Web UI (Nginx tabanlı)
  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:ubuntu-7.0-latest
    container_name: zabbix-web
    environment:
      DB_SERVER_HOST: zabbix-db
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix123
      POSTGRES_DB: zabbix
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: Europe/Istanbul
    ports:
      - "8080:8080"
    depends_on:
      - zabbix-server
      - zabbix-db
    restart: unless-stopped
    networks:
      - zabbix-net

  # Zabbix Agent (host'u izler)
  zabbix-agent:
    image: zabbix/zabbix-agent:ubuntu-7.0-latest
    container_name: zabbix-agent
    environment:
      ZBX_SERVER_HOST: zabbix-server
      ZBX_HOSTNAME: "docker-host"
    ports:
      - "10050:10050"
    privileged: true
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - zabbix-server
    restart: unless-stopped
    networks:
      - zabbix-net

volumes:
  postgres_vm_data:
  zabbix_db_data:

networks:
  zabbix-net:
    driver: bridge
